<html>
	<head>
		<title>MSEED UI</title>
		<script type="module" src="index.tsx.js"></script>
		<script>
			window.app_config = {"pyodide_vendored":false}
		</script>
	</head>
	<body>
		<div class="d3-container" style="width:100%;height:50%;">
			<svg width="100%" height="100%" viewBox="0 0 0 0">
				<defs>
					<clipPath id="heatmap-clip-0">
						<rect x="0" y="0" width="1" height="1"></rect>
					</clipPath>
				</defs>
				<g transform="translate(60,20)">
					<g clip-path="url(#heatmap-clip-0)">
						<g transform="translate(0,0) scale(1)">
							<image x="0" y="0" width="1" height="1" image-rendering="pixelated" preserveAspectRatio="none"></image>
						</g>
						<g transform="translate(0,0) scale(1)" style="pointer-events:none;"></g>
					</g>
					<g class="axis" transform="translate(0,1)"></g>
					<g class="axis"></g>
				</g>
			</svg>
		</div>
		<div style="display:flex;">
			<div class="container" style="position:relative;">
				<img style="width:600px;height:500px;border:1px gray solid;" />
				<div class="overlay" style="background:honeydew;opacity:0.6;position:absolute;top:0px;left:0px;width:100%;height:100%;display:flex;justify-content:center;align-items:center;font-family:sans-serif;pointer-events:none;">
					Select a MSEED channel and time to plot here.
				</div>
			</div>
			<div class="d3-container d3-map" style="position:relative;">
				<svg width="600" height="500" style="background-color:rgb(224,230,224);">
					<g class="tiles" pointer-events="none"></g>
					<g class="annotations"></g>
				</svg>
				<div class="overlay" style="background:honeydew;opacity:0.6;position:absolute;top:0px;left:0px;width:100%;height:100%;display:flex;justify-content:center;align-items:center;font-family:sans-serif;pointer-events:none;">No stations loaded.</div>
			</div>
		</div>
		<div style="background:honeydew;position:fixed;width:100%;height:100%;top:0px;left:0px;opacity:1;pointer-events:none;font-family:sans-serif;display:flex;justify-content:center;align-items:center;">Drop MSEED files to get started.</div>
	</body>
</html>
