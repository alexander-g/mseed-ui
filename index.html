<html>
	<head>
		<title>
			SEAL - Seismic Exploration &amp; Analysis Lab
		</title>
		<script type="module" src="index.tsx.js"></script>
		<script>
			window.app_config = {"pyodide_vendored":false}
		</script>
	</head>
	<body>
		<div style="display:flex;flex-direction:column;height:100%;">
			<div style="width:100%;height:50%;">
				<div class="d3-container" style="width:100%;height:100%;">
					<svg width="100%" height="100%" viewBox="0 0 0 0">
						<defs>
							<clipPath id="heatmap-clip-0">
								<rect x="0" y="0" width="1" height="1"></rect>
							</clipPath>
						</defs>
						<g transform="translate(60,5)">
							<g clip-path="url(#heatmap-clip-0)">
								<g transform="translate(0,0) scale(1,1)">
									<image x="0" y="0" width="1" height="1" image-rendering="pixelated" preserveAspectRatio="none"></image>
								</g>
								<g transform="translate(0,0) scale(1,1)" style="pointer-events:none;"></g>
							</g>
							<g class="axis" transform="translate(0,1)"></g>
							<g class="axis"></g>
						</g>
					</svg>
				</div>
			</div>
			<div style="width:100%;height:50%;">
				<div style="display:flex;flex-direction:column;height:100%;width:100%;">
					<div style="display:flex;gap:8px;padding:8px;height:100%;min-height:0px;">
						<div style="flex:1 1 0%;min-width:0px;height:100%;">
							<div class="d3-container d3-signal-plot" style="position:relative;width:100%;height:100%;user-select:none;">
								<svg width="100%" height="100%" viewBox="0 0 0 0">
									<defs>
										<clipPath id="signal-clip-0">
											<rect x="0" y="0" width="1" height="1"></rect>
										</clipPath>
									</defs>
									<g transform="translate(60,24)">
										<g clip-path="url(#signal-clip-0)">
											<path fill="none" stroke="#1f6fb2" stroke-width="1.5"></path>
										</g>
										<g></g>
										<g transform="translate(0,1)"></g>
										<text x="0.5" y="-8" text-anchor="middle" font-size="12px" font-family="sans-serif"></text>
										<text x="0.5" y="33" text-anchor="middle" font-size="11px" font-family="sans-serif">Time (UTC)</text>
										<text x="-0.5" y="-46" transform="rotate(-90)" text-anchor="middle" font-size="11px" font-family="sans-serif">Amplitude</text>
									</g>
								</svg>
								<div class="overlay" style="background:honeydew;opacity:0.6;position:absolute;top:0px;left:0px;width:100%;height:100%;display:flex;justify-content:center;align-items:center;font-family:sans-serif;pointer-events:none;">
									Select a MSEED channel and time to plot here.
								</div>
							</div>
						</div>
						<div style="flex:1 1 0%;min-width:0px;height:100%;">
							<div class="container" style="position:relative;width:100%;">
								<img style="width:100%;height:100%;border:1px gray solid;" />
								<div class="overlay" style="background:honeydew;opacity:0.6;position:absolute;top:0px;left:0px;width:100%;height:100%;display:flex;justify-content:center;align-items:center;font-family:sans-serif;pointer-events:none;">
									Select a MSEED channel and time to plot here.
								</div>
							</div>
						</div>
						<div style="flex:1 1 0%;min-width:0px;height:100%;display:none;">
							<div class="container" style="position:relative;width:100%;">
								<img style="width:100%;height:100%;border:1px gray solid;" />
								<div class="overlay" style="background:honeydew;opacity:0.6;position:absolute;top:0px;left:0px;width:100%;height:100%;display:flex;justify-content:center;align-items:center;font-family:sans-serif;pointer-events:none;">
									Select a MSEED channel and time to plot here.
								</div>
							</div>
						</div>
						<div style="flex:1 1 0%;min-width:0px;height:100%;display:none;">
							<div class="d3-container d3-map" style="position:relative;width:100%;height:100%;">
								<svg width="0" height="0" style="background-color:rgb(224,230,224);">
									<g class="tiles" pointer-events="none"></g>
									<g class="annotations"></g>
								</svg>
								<div class="overlay" style="background:honeydew;opacity:0.6;position:absolute;top:0px;left:0px;width:100%;height:100%;display:flex;justify-content:center;align-items:center;font-family:sans-serif;pointer-events:none;">No stations loaded.</div>
							</div>
						</div>
					</div>
					<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 8px;border-top:1px solid #d7d7d7;font-size:12px;color:#4b4b4b;">
						<div>
							<div style="display:flex;align-items:center;flex-wrap:wrap;row-gap:8px;column-gap:12px;color:#3f3f3f;font-size:12px;">
								<div style="display:flex;align-items:center;gap:6px;">
									<button type="button" style="padding:4px 8px;border:1px solid #bdbdbd;border-radius:4px;cursor:pointer;background-color:#ffffff;color:#2e2e2e;" disabled>Start</button>
									<button type="button" style="padding:4px 8px;border:1px solid #bdbdbd;border-radius:4px;cursor:pointer;background-color:#ffffff;color:#2e2e2e;" disabled>Pause</button>
									<button type="button" style="padding:4px 8px;border:1px solid #bdbdbd;border-radius:4px;cursor:pointer;background-color:#ffffff;color:#2e2e2e;" disabled>Stop</button>
								</div>
								<label style="display:flex;align-items:center;gap:6px;">
									<span>Speed</span>
									<input type="range" min="0.5" max="10" step="0.5" value="1" disabled />
									<span style="min-width:42px;">1.00x</span>
								</label>
								<label style="display:flex;align-items:center;gap:6px;">
									<span>Gain</span>
									<input type="range" min="0" max="5" step="0.1" value="1" disabled />
									<span style="min-width:42px;">1.00</span>
								</label>
								<label style="display:flex;align-items:center;gap:6px;min-width:220px;flex:1 1 220px;">
									<span>Position</span>
									<input type="range" min="0" max="1" step="0.01" value="0" disabled style="flex:1 1 auto;" />
									<output>00:00.000 / 00:00.000</output>
								</label>
							</div>
						</div>
						<div style="display:flex;flex-wrap:wrap;gap:6px;">
							<button style="padding:4px 8px;border:1px solid #bdbdbd;border-radius:4px;background-color:#2e4964;color:#ffffff;" type="button" aria-pressed="true">Signal</button>
							<button style="padding:4px 8px;border:1px solid #bdbdbd;border-radius:4px;background-color:#2e4964;color:#ffffff;" type="button" aria-pressed="true">Spectrogram</button>
							<button style="padding:4px 8px;border:1px solid #bdbdbd;border-radius:4px;cursor:pointer;background-color:#ffffff;color:#2e2e2e;" type="button" aria-pressed="false">Modulation Power Spectrum</button>
							<button style="padding:4px 8px;border:1px solid #bdbdbd;border-radius:4px;cursor:pointer;background-color:#ffffff;color:#2e2e2e;" type="button" aria-pressed="false">Map</button>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div style="background:honeydew;position:fixed;width:100%;height:100%;top:0px;left:0px;opacity:1;pointer-events:none;font-family:sans-serif;display:flex;justify-content:center;align-items:center;text-align:center;">
			Drop files to get started.
			<br />
			Supported file types: MiniSEED, QuakeML, StationXML.
		</div>
	</body>
</html>
